# Site settings
title: BeiTaaaaaaa Blog
SEOTitle: BeiTaaaaaaa的博客 | BeiTaaaaaaa Blog
header-img: img/my-own-images/my-home.png
email: 19732599070@163.com
description: "这里是BeiTaaaaaaa的个人GitHub网站"
keyword: "BeiTaaaaaaa, 博客, 个人网站, 算法, C++, Python, Java, MySQL, 运维, 全栈, LeetCode"
url: "https://BeiTaaaaaaa.github.io" # your host, for absolute URL
baseurl: "" # for example, '/blog' if your blog hosted on 'host/blog'
favicon: /img/my-own-images/site-logo.png

# Publish posts or collection documents with a future date.
future: true

# SNS settings
RSS: false
weibo_username: ""
zhihu_username: ""
github_username: BeiTaaaaaaa
twitter_username: ""
#facebook_username:  ""
#linkedin_username:  ""

# Build settings
# from 2016, 'pygments' is unsupported on GitHub Pages. Use 'rouge' for highlighting instead.
highlighter: rouge
permalink: pretty
paginate: 10
exclude:
  [
    "less",
    "node_modules",
    "Gruntfile.js",
    "package.json",
    "README.md",
    "README.zh.md",
  ]
anchorjs: true # if you want to customize anchor. check out line:181 of `post.html`
# If you have timezone issue (e.g. #68) in China, uncomment to use this:
#timezone: CN

# Gems
# from PR#40, to support local preview for Jekyll 3.0
# make sure you have this gem installed
# `$ gem install jekyll-paginate`
plugins: [jekyll-paginate]

# Markdown settings
# replace redcarpet to kramdown,
# although redcarpet can auto highlight code, the lack of header-id make the catalog impossible, so I switch to kramdown
# document: http://jekyllrb.com/docs/configuration/#kramdown
markdown: kramdown
kramdown:
  input: GFM # use Github Flavored Markdown !important
  syntax_highlighter_opts:
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Disqus settings
disqus_username: ""

# Netease settings
netease_comment: false

# Analytics settings
# Baidu Analytics
# ba_track_id: [your track id]

# Google Analytics
# ga_track_id: "" # Format: UA-xxxxxx-xx
# ga_domain: ""

# Sidebar settings
sidebar: true # whether or not using Sidebar.
sidebar-about-description: "一名热爱技术的计算机科学与技术专业学生，正在深入学习算法与数据结构，并探索前端、后端以及运维。"
sidebar-avatar: https://github.com/BeiTaaaaaaa.png # use absolute URL, seeing it's used in both `/` and `/about/`

# Featured Tags
featured-tags: true # whether or not using Feature-Tags
featured-condition-size: 0 # A tag will be featured if the size of it is more than this condition value

# Progressive Web Apps
chrome-tab-theme-color: "#000000"
service-worker: true

# MathJax rendering for layout:page (e.g. post preview)
page-mathjax: false

# Friends
friends: []
